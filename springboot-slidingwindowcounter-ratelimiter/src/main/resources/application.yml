server:
  port: 8081

rate-limiter:
  sliding-window-log:
    enabled: true
    limit: 100                 # max requests
    window-ms: 60000           # rolling window size
    key-type: IP               # IP | HEADER
    header-name: X-Api-Key     # used if key-type=HEADER
    include-headers: true      # add X-RateLimit-* headers

